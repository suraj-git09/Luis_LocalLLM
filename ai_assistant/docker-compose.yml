services:
  assistant:
    build: .
    container_name: ai-assistant
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434/v1
      DATA_DIR: /app/data
    volumes:
      - assistant_data:/app/data
    stdin_open: true
    tty: true
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ai-assistant-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  assistant_data:
  ollama_data: